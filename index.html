  <head>
    <script>
      (function() {
        try {
          var origFetch = window.fetch;
          if (origFetch) {
            var _fetch = origFetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // Safe fallback
        }
      })();
    </script>
